<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERA CARE | Products</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  
  <!-- ================= HEADER ================= -->
  <header class="header">
  <div class="container header-container">
    <div class="logo" data-i18n="logo">VERA CARE</div>

    <nav class="nav">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="products-details.html" data-i18n="nav_products">Products</a>
      <a href="index.html#about" data-i18n="nav_about">About</a>
      <a href="index.html#contact" data-i18n="nav_contact">Contact</a>
    </nav>
    <!-- Language Switch -->
    <div class="lang-switch">
      <button onclick="switchLanguage('en')">EN</button>
      <button onclick="switchLanguage('ar')">AR</button>

    </div>
   


    <button class="menu-toggle" id="menuToggle">☰</button>
  </div>
</header>
  <!-- ====== PRODUCTS LIST ====== -->
  <section class="products" id="products">
    <div class="container">
      <h2 class="section-title" data-i18n="products_title">Our Products</h2>
      <div class="products-grid" id="productsGrid">
        <!-- المنتجات هتتحمل ديناميكي من products.js -->
      </div>
    </div>
  </section>

  <!-- ====== FOOTER ====== -->
  <footer class="footer">
    <div class="container footer-container">
      <div class="footer-logo">
        <h3 data-i18n="logo">VERA CARE</h3>
        <p>Trusted Pharmaceutical Care</p>
      </div>

      <div class="footer-links">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="products-details.html" data-i18n="nav_products">Products</a>
        <a href="index.html#about" data-i18n="nav_about">About</a>
        <a href="index.html#contact" data-i18n="nav_contact">Contact</a>
      </div>

      <div class="footer-copy">
         <p data-i18n="footer_copy">© 2026 vera-care. All rights reserved.</p>
        
      </div>
    </div>
  </footer>

  <!-- JS Files -->
<script src="js/main.js"></script>
<script src="js/products.js"></script>
</body>
</html>
